<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f1eee5" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          var root = document.documentElement;
          root.setAttribute('data-theme', theme);
          root.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Katibeh&family=Cairo:wght@400;500;600;700;800&family=Chelsea+Market&family=Lalezar&display=swap"
      rel="stylesheet"
    />
    <title>قائمة المهام</title>
  </head>
  <body>
    <div class="aurora-field" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
