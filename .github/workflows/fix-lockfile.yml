name: Fix backend lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Find backend folder and regenerate lockfile
        run: |
          DIR=$(grep -rl '"multer"' --include=package.json . | head -n1 | xargs dirname)
          echo "Backend folder found: $DIR"
          cd "$DIR"
          npm install

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "fix: regenerate backend package-lock.json"
          git push
