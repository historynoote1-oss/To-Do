name: qaemat_almahaam
description: "قائمة المهام — تطبيق أندرويد أصلي بالكامل (Flutter/Dart)."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # نداءات الـ API للباك إند (نفس السيرفر بتاع الموقع)
  http: ^1.2.1

  # حفظ التوكن محليًا على الجهاز بعد تسجيل الدخول
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
