workflows:
  android-apk:
    name: بناء APK (قائمة المهام)
    max_build_duration: 30
    environment:
      flutter: stable
      # API_BASE_URL بيتاخد من متغيرات البيئة اللي ضفتها بنفسك في
      # Codemagic (App settings → Environment variables) — مفيش حاجة
      # تتغيّر هنا، الملف ده بس بيستخدمه وقت البناء.
    scripts:
      - name: تجهيز مجلد المنصّة (android) لو مش موجود
        script: |
          if [ ! -d "android" ]; then
            flutter create --platforms=android --org com.qaematalmahaam .
          fi
      - name: تنزيل المكتبات
        script: flutter pub get
      - name: بناء APK (مقسّم حسب نوع المعالج لتقليل الحجم)
        script: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=$API_BASE_URL \
            --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
